<html lang="zh-CN">
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #09090b;
      --bg-secondary: #0f0f12;
      --bg-elevated: #18181b;
      --accent-primary: #818cf8;
      --accent-secondary: #a78bfa;
      --accent-tertiary: #c084fc;
      --accent-glow: rgba(129, 140, 248, 0.15);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-emphasis: rgba(255, 255, 255, 0.1);
      --surface-glass: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.06);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      z-index: -2;
    }

    .bg-gradient::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(129, 140, 248, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(167, 139, 250, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(192, 132, 252, 0.04) 0%, transparent 60%);
      animation: drift 30s ease-in-out infinite;
    }

    .bg-gradient::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.015;
      pointer-events: none;
    }

    @keyframes drift {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: radial-gradient(circle, rgba(129, 140, 248, 0.6) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.4; }
      25% { transform: translateY(-80px) translateX(15px); opacity: 0.7; }
      50% { transform: translateY(-160px) translateX(-5px); opacity: 0.3; }
      75% { transform: translateY(-80px) translateX(20px); opacity: 0.6; }
    }

    /* Header */
    header {
      padding: 80px 40px 60px;
      text-align: center;
      position: relative;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border-emphasis);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow:
        0 0 0 1px rgba(129, 140, 248, 0.1) inset,
        0 2px 8px rgba(0, 0, 0, 0.4),
        0 8px 32px rgba(0, 0, 0, 0.3);
      animation: subtle-pulse 6s ease-in-out infinite;
    }

    @keyframes subtle-pulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.1) inset, 0 2px 8px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.3); }
      50% { box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.15) inset, 0 4px 12px rgba(0, 0, 0, 0.5), 0 12px 40px rgba(0, 0, 0, 0.4); }
    }

    .logo h1 {
      font-size: 52px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -3px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 400;
      margin-top: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Stats section */
    .stats {
      display: flex;
      justify-content: center;
      gap: 80px;
      margin-top: 56px;
      padding-bottom: 56px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .stat-item {
      text-align: center;
      position: relative;
    }

    .stat-item::before {
      content: '';
      position: absolute;
      left: -40px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 32px;
      background: linear-gradient(180deg, transparent, var(--border-subtle), transparent);
    }

    .stat-item:first-child::before {
      display: none;
    }

    .stat-value {
      font-size: 48px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.1;
      letter-spacing: -2px;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Search bar */
    .search-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--surface-glass);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      backdrop-filter: blur(20px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-box:focus-within {
      background: var(--surface-hover);
      border-color: var(--border-emphasis);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .search-box i {
      color: var(--text-muted);
      font-size: 16px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    /* Filter container */
    .filter-container {
      padding: 40px 40px 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: 1px solid var(--border-subtle);
      background: var(--surface-glass);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      letter-spacing: 0.3px;
    }

    .filter-btn:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
      border-color: var(--border-emphasis);
    }

    .filter-btn.active {
      background: var(--text-primary);
      border-color: var(--text-primary);
      color: var(--bg-primary);
      font-weight: 600;
    }

    /* Cards container */
    .cards-container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 56px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* Card styles */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 28px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      background: var(--bg-elevated);
      border-color: var(--border-emphasis);
      transform: translateY(-4px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 20px;
    }

    .avatar-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      object-fit: cover;
      border: 1px solid var(--border-subtle);
      transition: all 0.3s ease;
    }

    .card:hover .avatar {
      border-color: var(--border-emphasis);
    }

    .online-indicator {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 14px;
      height: 14px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--bg-secondary);
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .card-title {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 12px;
    }

    .card-company {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface-glass);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .card-bio {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .social-links {
      display: flex;
      gap: 8px;
    }

    .social-link {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-glass);
      color: var(--text-muted);
      transition: all 0.2s ease;
      text-decoration: none;
      border: 1px solid transparent;
    }

    .social-link:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
      border-color: var(--border-subtle);
    }

    .social-link i {
      font-size: 15px;
    }

    .card-tags {
      display: flex;
      gap: 6px;
    }

    .tag {
      padding: 4px 10px;
      background: var(--surface-glass);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 100px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* Back to top button */
    .back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    .back-to-top:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
      border-color: var(--border-emphasis);
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      header { padding: 56px 20px 40px; }
      .logo h1 { font-size: 36px; letter-spacing: -2px; }
      .logo-icon { width: 56px; height: 56px; font-size: 28px; }
      .stats { gap: 40px; flex-wrap: wrap; }
      .stat-item::before { display: none; }
      .stat-value { font-size: 36px; }
      .search-container { padding: 0 20px; }
      .filter-container { padding: 28px 20px 0; }
      .cards-container { padding: 28px 20px; grid-template-columns: 1fr; gap: 16px; }
      .card { padding: 20px; }
      .back-to-top { bottom: 20px; right: 20px; width: 44px; height: 44px; }
    }

    /* Card entrance animation */
    .card {
      animation: card-enter 0.5s ease-out backwards;
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

        avatar: "https://pbs.twimg.com/profile_images/1705477600261120000/YMrJ7Vgx_400x400.jpg",
        bio: "DeepMind联合创始人，Google AI产品负责人，现任Microsoft AI CEO",
        links: { x: "https://x.com/mustafafund" },
        tags: ["Products", "Applied AI"]
      },
      {
        name: "Satya Nadella",
        title: "CEO of Microsoft",
        company: "Microsoft",
        avatar: "https://pbs.twimg.com/profile_images/1595604523367923713/yS-t-r9T_400x400.jpg",
        bio: "Microsoft转型掌舵人，Copilot布局者，Azure AI推动者",
        links: { x: "https://x.com/satyanadella" },
        tags: ["Enterprise", "Cloud"]
      }
    ];

    let currentCompany = 'all';
    let searchTerm = '';

    function updateStats() {
      const companies = [...new Set(allPeople.map(p => p.company))];
      document.getElementById('people-count').textContent = allPeople.length;
      document.getElementById('company-count').textContent = companies.length;
    }

    function renderFilters() {
      const companies = [...new Set(allPeople.map(p => p.company))].sort();
      const container = document.getElementById('filter-container');
      container.innerHTML = `<button class="filter-btn active" data-company="all">全部</button>`;
      companies.forEach(company => {
        container.innerHTML += `<button class="filter-btn" data-company="${company}">${company}</button>`;
      });

      container.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          container.querySelector('.active').classList.remove('active');
          btn.classList.add('active');
          currentCompany = btn.dataset.company;
          renderCards();
        });
      });
    }

    function renderCards() {
      const container = document.getElementById('cards-container');
      const emptyState = document.getElementById('empty-state');

      let filtered = currentCompany === 'all' ? allPeople : allPeople.filter(p => p.company === currentCompany);

      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(term) ||
          p.title.toLowerCase().includes(term) ||
          p.company.toLowerCase().includes(term) ||
          (p.bio && p.bio.toLowerCase().includes(term)) ||
          (p.tags && p.tags.some(t => t.toLowerCase().includes(term)))
        );
      }

      if (filtered.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = filtered.map((person, index) => `
        <div class="card" style="animation-delay: ${index * 0.08}s">
          <div class="card-header">
            <div class="avatar-wrapper">
              <img class="avatar" src="${person.avatar}" alt="${person.name}"
                   onerror="this.src='https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${encodeURIComponent(person.name)}'">
              <div class="online-indicator"></div>
            </div>
            <div class="card-info">
              <h3 class="card-name">${person.name}</h3>
              <p class="card-title">${person.title}</p>
              <span class="card-company">
                <i class="fas fa-building"></i>
                ${person.company}
              </span>
            </div>
          </div>
          ${person.bio ? `<p class="card-bio">${person.bio}</p>` : ''}
          <div class="card-footer">
            <div class="social-links">
              ${Object.entries(person.links || {}).map(([platform, url]) => `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="social-link" title="${platform}">
                  <span class="${SOCIAL_ICONS[platform] === 'svg-icon' ? '' : SOCIAL_ICONS[platform]}">${platform === 'x' ? X_SVG : ''}</span>
                </a>
              `).join('')}
            </div>
            <div class="card-tags">
              ${(person.tags || []).slice(0, 2).map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    function initSearch() {
      const searchInput = document.getElementById('search-input');
      searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value.trim();
        renderCards();
      });
    }

    createParticles();
    initBackToTop();
    initSearch();
    updateStats();
    renderFilters();
    renderCards();
  </script>
</body>
</html>
